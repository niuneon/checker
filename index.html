<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nyonyonyo</title>
<style>
body {
  font-family: sans-serif;
  background: #232124;
  color: #e8e3d8;
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px;
  font-size: 13px;
}

h1 {
  font-size: 18px;
  color: #e5d4a5;
  margin: 6px 0 10px;
}

h2 {
  font-size: 15px;
  margin: 12px 0 6px;
}

textarea {
  width: 100%;
  font-size: 16px;
  line-height: 1.5;
  padding: 8px;
  box-sizing: border-box;
  border-radius: 8px;
}

@media (min-width: 768px) {
  textarea {
    font-size: 14px;
  }
}

::selection {
  background: #d7b6d8;
  color: #fff;
}

#source {
  height: 150px;
  background: #2d2b2f;
  color: #d9d2c3;
  border: 1px solid #4a464d;
}

#memo {
  height: 180px;
  background: #2a282c;
  color: #f2ede3;
  border: 1px solid #4a464d;
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  font-size: 13px;
  border: 0;
  border-radius: 8px;
  background: #4d4456;
  color: #f6f1e8;
}

button:hover {
  background: #5c5268;
}

.danger {
  background: #7a4d58;
}

.danger:hover {
  background: #8e5c69;
}

.alert {
  position: sticky;
  top: 0;
  z-index: 10;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
  background: #fff3cd;
  color: #7a5200;
  font-size: 13px;
}

.ok {
  background: #e7f6e7;
  color: #206020;
}

.preview {
  margin-top: 10px;
  padding: 8px;
  background: #2a282c;
  border: 1px solid #4a464d;
  border-radius: 8px;
  min-height: 60px;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 13px;
}

.bad {
  color: #ff6b6b;
  font-weight: bold;
}

.warn {
  color: #ffd166;
  font-weight: bold;
  text-decoration: underline;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  z-index: 999;
  padding: 10px 14px;
  border-radius: 999px;
  background: #d7b6d8;
  color: #232124;
  font-size: 13px;
  font-weight: bold;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<h1>nyonyonyo</h1>

<h2>引用元</h2>
<textarea id="source" placeholder="相手のメッセージをここに貼る"></textarea>

<h2>返信文</h2>
<div id="message" class="alert"></div>

<textarea id="memo" placeholder="ここに文章を書く"></textarea>

<button onclick="convertText()">全角英数字・カッコを半角に変換</button>
<button onclick="copyText()">コピー</button>
<button onclick="clearAll()" class="danger">クリア</button>

<h2>チェック表示</h2>
<div id="preview" class="preview"></div>

<div id="toast" class="toast">コピーしました</div>

<script>
const source = document.getElementById("source");
const memo = document.getElementById("memo");
const message = document.getElementById("message");
const preview = document.getElementById("preview");
const toast = document.getElementById("toast");

const errorPattern = /[０-９Ａ-Ｚａ-ｚ（）!?]/g;
const warningPattern = /修/g;

let toastTimer;

source.value = localStorage.getItem("sourceText") || "";
memo.value = localStorage.getItem("memoText") || "";
checkText();

source.addEventListener("input", () => {
  localStorage.setItem("sourceText", source.value);
});

memo.addEventListener("input", () => {
  localStorage.setItem("memoText", memo.value);
  checkText();
});

function checkText() {
  const text = memo.value;

  const errors = text.match(errorPattern);
  const warnings = text.match(warningPattern);

  let messages = [];

  if (errors) {
    messages.push(
      "要修正: " +
      [...new Set(errors)].join(" ")
    );
  }

  if (warnings) {
    messages.push("確認: 修");
  }

  if (messages.length === 0) {
    message.className = "alert ok";
    message.textContent = "OK！対象文字はありません。";
  } else {
    message.className = "alert";
    message.innerHTML = messages.join("<br>");
  }

  preview.innerHTML = escapeHtml(text).replace(
    /[０-９Ａ-Ｚａ-ｚ（）!?修]/g,
    function(s) {
      if (s === "修") {
        return '<span class="warn">' + s + '</span>';
      }
      return '<span class="bad">' + s + '</span>';
    }
  );
}

function convertText() {
  let text = memo.value;

  text = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });

  text = text
    .replaceAll("（", "(")
    .replaceAll("）", ")")
    .replaceAll("!", "！")
    .replaceAll("?", "？");

  memo.value = text;
  localStorage.setItem("memoText", text);
  checkText();
}

function copyText() {
  navigator.clipboard.writeText(memo.value);
  showToast("コピーしました");
}

function clearAll() {
  if (!confirm("引用元と返信文を消しますか？")) {
    return;
  }

  source.value = "";
  memo.value = "";

  localStorage.removeItem("sourceText");
  localStorage.removeItem("memoText");

  checkText();
  showToast("クリアしました");
}

function showToast(text) {
  toast.textContent = text;
  toast.classList.add("show");

  clearTimeout(toastTimer);

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1400);
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>
</body>
</html>
