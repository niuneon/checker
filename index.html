<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nyonyonyo</title>
<style>
:root {
  --bg: #232124;
  --panel: #2a282c;
  --panel2: #2d2b2f;
  --text: #e8e3d8;
  --subtext: #d9d2c3;
  --border: #4a464d;
  --button: #4d4456;
  --button-hover: #5c5268;
  --danger: #7a4d58;
  --danger-hover: #8e5c69;
  --title: #e5d4a5;
  --alert-bg: #fff3cd;
  --alert-text: #7a5200;
  --ok-bg: #e7f6e7;
  --ok-text: #206020;
  --error: #ff6b6b;
  --check: #ffd166;
  --selection: #d7b6d8;
  --toast-bg: #d7b6d8;
  --toast-text: #232124;
}

body {
  font-family: sans-serif;
  background: var(--bg);
  color: var(--text);
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px;
  font-size: 13px;
}

h1 {
  font-size: 18px;
  color: var(--title);
  margin: 6px 0 10px;
}

h2 {
  font-size: 15px;
  margin: 12px 0 6px;
}

.theme-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 10px;
}

select {
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  background: var(--panel2);
  color: var(--text);
  border: 1px solid var(--border);
  font-size: 13px;
}

textarea {
  width: 100%;
  font-size: 16px;
  line-height: 1.5;
  padding: 8px;
  box-sizing: border-box;
  border-radius: 8px;
}

@media (min-width: 500px) {
  textarea {
    font-size: 14px;
  }
}

::selection {
  background: var(--selection);
  color: #fff;
}

#source {
  height: 150px;
  background: var(--panel2);
  color: var(--subtext);
  border: 1px solid var(--border);
}

#memo {
  height: 180px;
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  font-size: 13px;
  border: 0;
  border-radius: 8px;
  background: var(--button);
  color: #f6f1e8;
}

button:hover {
  background: var(--button-hover);
}

.danger {
  background: var(--danger);
}

.danger:hover {
  background: var(--danger-hover);
}

.alert {
  position: sticky;
  top: 0;
  z-index: 10;
  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
  background: var(--alert-bg);
  color: var(--alert-text);
  font-size: 13px;
}

.ok {
  background: var(--ok-bg);
  color: var(--ok-text);
}

.preview {
  margin-top: 10px;
  padding: 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 8px;
  min-height: 60px;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 13px;
}

.bad {
  color: var(--error);
  font-weight: bold;
}

.warn {
  color: var(--check);
  font-weight: bold;
  text-decoration: underline;
}

.toast {
  position: fixed;
  left: 50%;
  bottom: 24px;
  transform: translateX(-50%) translateY(20px);
  z-index: 999;
  padding: 10px 14px;
  border-radius: 999px;
  background: var(--toast-bg);
  color: var(--toast-text);
  font-size: 13px;
  font-weight: bold;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>

<body>
<h1>nyonyonyo</h1>

<div class="theme-row">
  <select id="themeSelect">
    <option value="night">Midnight</option>
    <option value="cafe">Latte</option>
    <option value="lavender">Lavender</option>
    <option value="sakura">Hanami</option>
    <option value="pudding">Pudding</option>
    <option value="sumi">Sumi</option>
  </select>
</div>

<h2>引用元</h2>
<textarea id="source" placeholder="相手のメッセージをここに貼る"></textarea>

<h2>返信文</h2>
<div id="message" class="alert"></div>

<textarea id="memo" placeholder="ここに文章を書く"></textarea>

<button onclick="convertText()">全角英数字・カッコを半角に変換</button>
<button onclick="copyText()">コピー</button>
<button onclick="clearAll()" class="danger">クリア</button>

<h2>チェック表示</h2>
<div id="preview" class="preview"></div>

<div id="toast" class="toast">コピーしました</div>

<script>
const source = document.getElementById("source");
const memo = document.getElementById("memo");
const message = document.getElementById("message");
const preview = document.getElementById("preview");
const toast = document.getElementById("toast");
const themeSelect = document.getElementById("themeSelect");

const errorPattern = /[０-９Ａ-Ｚａ-ｚ（）!?]/g;
const warningPattern = /修/g;

let toastTimer;

const themes = {
  night: {
    bg: "#232124",
    panel: "#2a282c",
    panel2: "#2d2b2f",
    text: "#e8e3d8",
    subtext: "#d9d2c3",
    border: "#4a464d",
    button: "#4d4456",
    buttonHover: "#5c5268",
    danger: "#7a4d58",
    dangerHover: "#8e5c69",
    title: "#e5d4a5",
    selection: "#d7b6d8",
    toastBg: "#d7b6d8",
    toastText: "#232124"
  },
  cafe: {
    bg: "#2c2520",
    panel: "#3a312b",
    panel2: "#342c27",
    text: "#f0e4d5",
    subtext: "#d7c4ad",
    border: "#5a4a40",
    button: "#876445",
    buttonHover: "#9a7350",
    danger: "#7b4d48",
    dangerHover: "#8c5a54",
    title: "#f2d7a1",
    selection: "#c69c6d",
    toastBg: "#f2d7a1",
    toastText: "#2c2520"
  },
lavender: {
  bg: "#f7f4f8",          // 少しだけ紫みのある白
  panel: "#ffffff",       // 入力欄
  panel2: "#f2edf5",      // 引用欄
  text: "#4b4652",        // 濃いグレー
  subtext: "#6c6575",
  border: "#d8cfe2",
  button: "#a688c7",      // ラベンダー
  buttonHover: "#9574b8",
  danger: "#d38fa3",      // くすみピンク
  dangerHover: "#c77f95",
  title: "#8264a9",       // 紫
  selection: "#dcc8f0",
  toastBg: "#b59ad8",
  toastText: "#ffffff"
},
  sakura: {
    bg: "#2d2630",
    panel: "#3a313d",
    panel2: "#342b37",
    text: "#f3e6ef",
    subtext: "#d8c2d2",
    border: "#57465a",
    button: "#86617a",
    buttonHover: "#9a708d",
    danger: "#7f4f65",
    dangerHover: "#925c75",
    title: "#ffd7ef",
    selection: "#d7a6c9",
    toastBg: "#ffd7ef",
    toastText: "#2d2630"
  },
  pudding: {
    bg: "#2b261f",
    panel: "#393126",
    panel2: "#332c23",
    text: "#f3ead7",
    subtext: "#d8c9aa",
    border: "#5a4c38",
    button: "#9a7a42",
    buttonHover: "#ad8a4c",
    danger: "#814d45",
    dangerHover: "#965a51",
    title: "#ffe1a6",
    selection: "#e0b96b",
    toastBg: "#ffe1a6",
    toastText: "#2b261f"
  },
  sumi: {
    bg: "#17191f",
    panel: "#20232b",
    panel2: "#1d2027",
    text: "#e6e8ef",
    subtext: "#bfc3d0",
    border: "#3a3f4d",
    button: "#3f4658",
    buttonHover: "#4d566c",
    danger: "#6e4654",
    dangerHover: "#815363",
    title: "#c9d4ff",
    selection: "#8d9ad8",
    toastBg: "#c9d4ff",
    toastText: "#17191f"
  }
};

function applyTheme(name) {
  const t = themes[name] || themes.night;
  const root = document.documentElement;

  root.style.setProperty("--bg", t.bg);
  root.style.setProperty("--panel", t.panel);
  root.style.setProperty("--panel2", t.panel2);
  root.style.setProperty("--text", t.text);
  root.style.setProperty("--subtext", t.subtext);
  root.style.setProperty("--border", t.border);
  root.style.setProperty("--button", t.button);
  root.style.setProperty("--button-hover", t.buttonHover);
  root.style.setProperty("--danger", t.danger);
  root.style.setProperty("--danger-hover", t.dangerHover);
  root.style.setProperty("--title", t.title);
  root.style.setProperty("--selection", t.selection);
  root.style.setProperty("--toast-bg", t.toastBg);
  root.style.setProperty("--toast-text", t.toastText);

  localStorage.setItem("themeName", name);
  themeSelect.value = name;
}

const savedTheme = localStorage.getItem("themeName") || "night";
applyTheme(savedTheme);

themeSelect.addEventListener("change", () => {
  applyTheme(themeSelect.value);
});

source.value = localStorage.getItem("sourceText") || "";
memo.value = localStorage.getItem("memoText") || "";
checkText();

source.addEventListener("input", () => {
  localStorage.setItem("sourceText", source.value);
});

memo.addEventListener("input", () => {
  localStorage.setItem("memoText", memo.value);
  checkText();
});

function checkText() {
  const text = memo.value;

  const errors = text.match(errorPattern);
  const warnings = text.match(warningPattern);

  let messages = [];

  if (errors) {
    messages.push(
      "要修正: " +
      [...new Set(errors)].join(" ")
    );
  }

  if (warnings) {
    messages.push("確認: 修");
  }

  if (messages.length === 0) {
    message.className = "alert ok";
    message.textContent = "OK！対象文字はありません。";
  } else {
    message.className = "alert";
    message.innerHTML = messages.join("<br>");
  }

  preview.innerHTML = escapeHtml(text).replace(
    /[０-９Ａ-Ｚａ-ｚ（）!?修]/g,
    function(s) {
      if (s === "修") {
        return '<span class="warn">' + s + '</span>';
      }
      return '<span class="bad">' + s + '</span>';
    }
  );
}

function convertText() {
  let text = memo.value;

  text = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });

  text = text
    .replaceAll("（", "(")
    .replaceAll("）", ")")
    .replaceAll("!", "！")
    .replaceAll("?", "？");

  memo.value = text;
  localStorage.setItem("memoText", text);
  checkText();
}

function copyText() {
  navigator.clipboard.writeText(memo.value);
  showToast("コピーしました");
}

function clearAll() {
  if (!confirm("引用元と返信文を消しますか？")) {
    return;
  }

  source.value = "";
  memo.value = "";

  localStorage.removeItem("sourceText");
  localStorage.removeItem("memoText");

  checkText();
  showToast("クリアしました");
}

function showToast(text) {
  toast.textContent = text;
  toast.classList.add("show");

  clearTimeout(toastTimer);

  toastTimer = setTimeout(() => {
    toast.classList.remove("show");
  }, 1400);
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>
</body>
</html>
