<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nyonyonyo</title>
<style>
body {
  font-family: sans-serif;
  background: #232124;
  color: #e8e3d8;
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px;
  font-size: 13px;
}

h1 {
  font-size: 18px;
  color: #e5d4a5;
  margin: 6px 0 10px;
}

h2 {
  font-size: 15px;
  margin: 12px 0 6px;
}

textarea {
  width: 100%;
  font-size: 16px; /* iPhoneズーム防止 */
  line-height: 1.5;
  padding: 8px;
  box-sizing: border-box;
}

/* PC */
@media (min-width: 400px) {
  textarea {
    font-size: 12px;
  }
}

::selection {
  background: #d7b6d8;
  color: #fff;
}

#source {
  background: #2d2b2f;
  color: #d9d2c3;
  border: 1px solid #4a464d;
}

#memo {
  height: 180px;
  background: #2a282c;
  color: #f2ede3;
  border: 1px solid #4a464d;
}

button {
  width: 100%;
  margin-top: 8px;
  padding: 10px;
  font-size: 13px;
  border: 0;
  border-radius: 8px;
  background: #4d4456;
  color: #f6f1e8;
}

button:hover {
  background: #5c5268;
}

.alert {
  position: sticky;
  top: 0;
  z-index: 10;

  margin-bottom: 8px;
  padding: 8px;
  border-radius: 8px;
  background: #fff3cd;
  color: #7a5200;
  font-size: 13px;
}

.ok {
  background: #e7f6e7;
  color: #206020;
}

.preview {
  margin-top: 10px;
  padding: 8px;
  background: #2a282c;
  border: 1px solid #4a464d;
  min-height: 60px;
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 13px;
}

.bad {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>
<h1>全角半角チェッカー</h1>

<h2>引用元</h2>
<textarea id="source" placeholder="相手のメッセージをここに貼る"></textarea>

<h2>返信文</h2>
<div id="message" class="alert"></div>

<textarea id="memo" placeholder="ここに文章を書く"></textarea>

<button onclick="convertText()">全角英数字・カッコを半角に変換</button>
<button onclick="copyText()">コピー</button>

<h2>チェック表示</h2>
<div id="preview" class="preview"></div>

<script>
const source = document.getElementById("source");
const memo = document.getElementById("memo");
const message = document.getElementById("message");
const preview = document.getElementById("preview");

const pattern = /[０-９Ａ-Ｚａ-ｚ（）]/g;

// 前回の一時保存を復元
source.value = localStorage.getItem("sourceText") || "";
memo.value = localStorage.getItem("memoText") || "";
checkText();

source.addEventListener("input", () => {
  localStorage.setItem("sourceText", source.value);
});

memo.addEventListener("input", () => {
  localStorage.setItem("memoText", memo.value);
  checkText();
});

function checkText() {
  const text = memo.value;
  const matches = text.match(pattern);

  if (matches) {
    message.className = "alert";
    message.textContent =
      "⚠ 全角英数字・全角カッコがあります： " +
      [...new Set(matches)].join(" ");
  } else {
    message.className = "alert ok";
    message.textContent = "OK！対象文字はありません。";
  }

  preview.innerHTML = escapeHtml(text).replace(
    pattern,
    '<span class="bad">$&</span>'
  );
}

function convertText() {
  let text = memo.value;

  text = text.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(s) {
    return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
  });

  text = text.replaceAll("（", "(").replaceAll("）", ")");

  memo.value = text;
  localStorage.setItem("memoText", text);
  checkText();
}

function copyText() {
  navigator.clipboard.writeText(memo.value);
}

function escapeHtml(str) {
  return str
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;");
}
</script>
</body>
</html>
